name: CI -ProjectB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Node.js Install
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Dependencies Install
        run: npm ci

      - name: Setup env for CI
        run: cp .env.test .env

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests Run
        run: npm run test